# =============================================================
#  CastMate — Configuration Sveltia CMS
#  Emplacement : src/admin/config.yml  (servi sur /admin/config.yml)
#  Doc : https://github.com/sveltia/sveltia-cms
# =============================================================

backend:
  name: github
  repo: Ilionito/castmate-site
  branch: main
  base_url: https://sveltia-cms-auth.hillion-joris00.workers.dev

# Dossier où atterrissent les images/vidéos ajoutées depuis l'admin
media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

# Interface en français
locale: fr

collections:
  - name: contenu
    label: "Contenu du site"
    label_singular: "Section"
    description: "Modifiez ici tous les textes, images, vidéos et liens de la page d'accueil."
    files:

      # ---------- SEO / Métadonnées ----------
      # Sert à la fois pour la home FR et de fallback global pour les autres
      # pages dont le champ SEO par page est laissé vide.
      - name: meta
        label: "Réglages SEO globaux + assets partagés (homepage + fallback)"
        file: "src/_data/meta.json"
        fields:
          - { name: siteUrl, label: "URL canonique du site (sans slash final)", widget: string, default: "https://castmate.fr", hint: "Sert à construire canonical, og:url et les liens hreflang. Ex. https://castmate.fr" }
          - { name: siteName, label: "Nom du site (og:site_name)", widget: string, default: "CastMate", hint: "Utilisé pour og:site_name. Visible sur les aperçus de partage." }
          - { name: robots, label: "Directive robots par défaut", widget: string, default: "index, follow, max-image-preview:large", hint: "S'applique à toutes les pages qui n'ont pas de directive robots spécifique." }
          - { name: title, label: "SEO Title", widget: string, hint: "~60 caractères max. Utilisé sur la home et comme fallback global." }
          - { name: description, label: "SEO Description", widget: text, hint: "~155 caractères max. Utilisé sur la home et comme fallback global." }
          - { name: ogImage, label: "Image de partage — Home (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé." }
          - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - { name: favicon, label: "Favicon", widget: image, required: false, hint: "PNG carré, 512×512 recommandé." }
          - { name: appleTouchIcon, label: "Apple touch icon (iOS)", widget: image, required: false, hint: "PNG carré, 180×180." }
          - { name: secondaryHeroBackground, label: "Pages secondaires — image de fond du hero", widget: image, required: false, hint: "Utilisée par Contact, Démo et les pages légales. 1920×1200 recommandé." }
          - { name: secondaryHeroBackgroundAlt, label: "Pages secondaires — alt du fond du hero", widget: string, required: false }
          - { name: secondaryHeroDecoration, label: "Pages secondaires — forme décorative (SVG)", widget: image, required: false, hint: "SVG décoratif placé derrière le hero." }
          - { name: legalOgImage, label: "Image de partage — Pages légales", widget: image, required: false, hint: "Image utilisée pour le partage des 4 pages légales." }
          - { name: legalOgImageAlt, label: "Image de partage légales — texte alternatif", widget: string, required: false }

      # ---------- Navigation (header) ----------
      - name: nav
        label: "Navigation (header)"
        file: "src/_data/nav.json"
        fields:
          - { name: logo, label: "Logo (header + footer)", widget: image, required: false, hint: "PNG transparent. Réutilisé pour le header et le pied de page sur toutes les pages." }
          - { name: logoAlt, label: "Texte alternatif du logo", widget: string }
          - name: links
            label: "Liens du menu"
            widget: list
            # Liste indexée côté template (accès {{ nav.links[N] }}) — figée à 2 items.
            min: 2
            max: 2
            summary: "{{fields.label}} -> {{fields.url}}"
            fields:
              - { name: label, label: "Libellé", widget: string }
              - { name: url, label: "Lien", widget: string }
          - { name: ctaLabel, label: "Bouton — libellé", widget: string }
          - { name: ctaUrl, label: "Bouton — lien", widget: string }

      # ---------- Hero ----------
      - name: hero
        label: "Hero (haut de page)"
        file: "src/_data/hero.json"
        fields:
          - { name: backgroundImage, label: "Image de fond (forme)", widget: image, required: false }
          - { name: title, label: "Titre principal", widget: string }
          - { name: description, label: "Sous-titre", widget: text }
          - { name: ctaLabel, label: "Bouton — libellé", widget: string }
          - { name: ctaUrl, label: "Bouton — lien", widget: string }
          - name: pills
            label: "Mots-clés (puces)"
            widget: list
            # Liste indexée — figée à 4 items.
            min: 4
            max: 4
            field: { name: label, label: "Texte", widget: string }
          - { name: image, label: "Image principale", widget: image }

      # ---------- Étapes ----------
      - name: steps
        label: "Étapes (Créez votre casting)"
        file: "src/_data/steps.json"
        fields:
          - { name: title, label: "Titre de la section", widget: string }
          - { name: subtitle, label: "Sous-titre", widget: text }
          - name: items
            label: "Étapes"
            widget: list
            # Liste indexée — figée à 6 items.
            min: 6
            max: 6
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Description", widget: text }

      # ---------- Fonctionnalités ----------
      - name: features
        label: "Fonctionnalités (Conçu pour les équipes)"
        file: "src/_data/features.json"
        fields:
          - { name: title, label: "Titre de la section", widget: string }
          - { name: subtitle, label: "Sous-titre", widget: text }
          - name: items
            label: "Cartes"
            widget: list
            # Liste indexée — figée à 4 items.
            min: 4
            max: 4
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Description", widget: text }
              - { name: image, label: "Image", widget: image }

      # ---------- Sécurité ----------
      - name: security
        label: "Sécurité & confidentialité"
        file: "src/_data/security.json"
        fields:
          - { name: title, label: "Titre de la section", widget: string }
          - { name: intro, label: "Introduction", widget: text }
          - name: cards
            label: "Cartes"
            widget: list
            # Liste indexée — figée à 2 items.
            min: 2
            max: 2
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Description", widget: text }
              - { name: image, label: "Image", widget: image }

      # ---------- Pilotage / Clarté ----------
      - name: clarity
        label: "Pilotez avec plus de clarté"
        file: "src/_data/clarity.json"
        fields:
          - { name: title, label: "Titre de la section", widget: string }
          - { name: intro, label: "Introduction", widget: text }
          - name: blocks
            label: "Blocs"
            widget: list
            # Liste indexée — figée à 3 items.
            min: 3
            max: 3
            summary: "{{fields.tag}} — {{fields.title}}"
            fields:
              - { name: tag, label: "Étiquette", widget: string }
              - { name: title, label: "Titre", widget: string }
              - { name: text, label: "Description", widget: text }
              - { name: image, label: "Image", widget: image }
          - { name: video, label: "Vidéo (.mp4)", widget: file, required: false }
          - { name: videoPoster, label: "Vidéo — image affichée avant lecture (poster)", widget: image, required: false, hint: "1074×1074 recommandé." }
          - { name: videoPosterAlt, label: "Vidéo — alt du poster", widget: string, required: false }

      # ---------- CTA équipe ----------
      - name: teamCta
        label: "Bandeau « Travailler en équipe »"
        file: "src/_data/teamCta.json"
        fields:
          - { name: title, label: "Titre", widget: string }
          - { name: text, label: "Texte", widget: text }
          - name: bullets
            label: "Puces"
            widget: list
            # Liste indexée — figée à 3 items.
            min: 3
            max: 3
            field: { name: label, label: "Texte", widget: string }
          - { name: ctaLabel, label: "Bouton — libellé", widget: string }
          - { name: ctaUrl, label: "Bouton — lien", widget: string }

      # ---------- Témoignages ----------
      - name: testimonials
        label: "Témoignages"
        file: "src/_data/testimonials.json"
        fields:
          - { name: title, label: "Titre de la section", widget: string }
          - { name: intro, label: "Introduction", widget: text }
          - name: items
            label: "Témoignages"
            widget: list
            # Liste indexée — figée à 2 items.
            min: 2
            max: 2
            summary: "{{fields.author}} — {{fields.role}}"
            fields:
              - { name: heading, label: "Accroche", widget: text }
              - { name: quote, label: "Citation", widget: text }
              - { name: author, label: "Auteur", widget: string }
              - { name: role, label: "Fonction", widget: string }

      # ---------- FAQ ----------
      - name: faq
        label: "FAQ"
        file: "src/_data/faq.json"
        fields:
          - { name: eyebrow, label: "Étiquette (au-dessus du titre, ex. « FAQ »)", widget: string }
          - { name: title, label: "Titre de la section", widget: string }
          - { name: subtitle, label: "Sous-titre", widget: text }
          - { name: ctaLabel, label: "Bouton — libellé", widget: string }
          - { name: ctaUrl, label: "Bouton — lien", widget: string }
          - name: items
            label: "Questions / Réponses"
            widget: list
            # Accordéon natif <details> (détaché du runtime Framer) — le
            # nombre d'items peut varier librement.
            min: 1
            summary: "{{fields.question}}"
            fields:
              - { name: question, label: "Question", widget: string }
              - { name: answer, label: "Réponse", widget: text }

      # ---------- Footer ----------
      - name: footer
        label: "Pied de page"
        file: "src/_data/footer.json"
        fields:
          - { name: tagline, label: "Accroche", widget: string }
          - { name: linkedinUrl, label: "Lien LinkedIn", widget: string }
          - { name: ctaLabel, label: "Bouton — libellé", widget: string }
          - { name: ctaUrl, label: "Bouton — lien", widget: string }
          - name: legalLinks
            label: "Liens légaux"
            widget: list
            # Liste indexée — figée à 4 items.
            min: 4
            max: 4
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: "Libellé", widget: string }
              - { name: url, label: "Lien", widget: string }
          - { name: companyName, label: "Raison sociale", widget: string }
          - { name: email, label: "Email de contact", widget: string }
          - { name: altEmail, label: "Email secondaire", widget: string }
          - { name: siren, label: "SIREN", widget: string }
          - { name: rcs, label: "RCS", widget: string }
          - { name: copyright, label: "Mention copyright", widget: string }

      # ---------- Page Contact ----------
      - name: contact
        label: "Page Contact"
        file: "src/_data/contact.json"
        fields:
          - name: meta
            label: "SEO / Métadonnées"
            widget: object
            fields:
              - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le réglage SEO global." }
              - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max. Laisser vide pour utiliser le réglage SEO global." }
              - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
              - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé. Utilisée par les balises og:image et twitter:image." }
              - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: hero
            label: "Bloc Hero"
            widget: object
            fields:
              - { name: title, label: "Titre principal", widget: string }
              - { name: subtitle, label: "Sous-titre (HTML autorisé, ex. <br/>)", widget: text }
          - name: form
            label: "Formulaire"
            widget: object
            fields:
              - { name: endpoint, label: "Endpoint Formspree (URL POST)", widget: string }
              - { name: successRedirect, label: "Redirection après envoi (URL ou ancre)", widget: string }
              - { name: successMessage, label: "Message de confirmation après envoi", widget: text }
              - { name: nameLabel, label: "Libellé champ Nom", widget: string }
              - { name: namePlaceholder, label: "Placeholder champ Nom", widget: string }
              - { name: emailLabel, label: "Libellé champ Email", widget: string }
              - { name: emailPlaceholder, label: "Placeholder champ Email", widget: string }
              - { name: phoneLabel, label: "Libellé champ Téléphone", widget: string }
              - { name: phonePlaceholder, label: "Placeholder champ Téléphone", widget: string }
              - { name: messageLabel, label: "Libellé champ Message", widget: string }
              - { name: messagePlaceholder, label: "Placeholder champ Message", widget: string }
              - { name: consentPrefix, label: "Consentement — texte avant le lien", widget: string }
              - { name: consentLinkLabel, label: "Consentement — libellé du lien", widget: string }
              - { name: consentLinkUrl, label: "Consentement — URL du lien", widget: string }
              - { name: submitLabel, label: "Bouton — libellé", widget: string }
              - { name: sideImage, label: "Image latérale du formulaire", widget: image, required: false, hint: "Affichée à côté du formulaire (desktop). Format vertical recommandé." }
              - { name: sideImageAlt, label: "Image latérale — texte alternatif", widget: string, required: false }

      # ---------- Page Démo ----------
      - name: demo
        label: "Page Démo"
        file: "src/_data/demo.json"
        fields:
          - name: meta
            label: "SEO / Métadonnées"
            widget: object
            fields:
              - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le réglage SEO global." }
              - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max. Laisser vide pour utiliser le réglage SEO global." }
              - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
              - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé. Utilisée par les balises og:image et twitter:image." }
              - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: hero
            label: "Bloc Hero"
            widget: object
            fields:
              - { name: title, label: "Titre principal", widget: string }
              - { name: subtitle, label: "Sous-titre (HTML autorisé, ex. <br/>)", widget: text }
          - name: form
            label: "Formulaire"
            widget: object
            fields:
              - { name: endpoint, label: "Endpoint Formspree (URL POST)", widget: string }
              - { name: successRedirect, label: "Redirection après envoi (URL ou ancre)", widget: string }
              - { name: successMessage, label: "Message de confirmation après envoi", widget: text }
              - { name: nameLabel, label: "Libellé champ Nom", widget: string }
              - { name: namePlaceholder, label: "Placeholder champ Nom", widget: string }
              - { name: emailLabel, label: "Libellé champ Email", widget: string }
              - { name: emailPlaceholder, label: "Placeholder champ Email", widget: string }
              - { name: phoneLabel, label: "Libellé champ Téléphone", widget: string }
              - { name: phonePlaceholder, label: "Placeholder champ Téléphone", widget: string }
              - { name: messageLabel, label: "Libellé champ Message", widget: string }
              - { name: messagePlaceholder, label: "Placeholder champ Message", widget: string }
              - { name: consentPrefix, label: "Consentement — texte avant le lien", widget: string }
              - { name: consentLinkLabel, label: "Consentement — libellé du lien", widget: string }
              - { name: consentLinkUrl, label: "Consentement — URL du lien", widget: string }
              - { name: submitLabel, label: "Bouton — libellé", widget: string }
              - { name: sideImage, label: "Image latérale du formulaire", widget: image, required: false, hint: "Affichée à côté du formulaire (desktop). Format vertical recommandé." }
              - { name: sideImageAlt, label: "Image latérale — texte alternatif", widget: string, required: false }

      # ---------- Version anglaise (EN) ----------
      # Une seule entrée éditable qui regroupe les SEO meta de la home EN,
      # de /en/contact et de /en/demo. Les champs SEO seulement sont exposés
      # ici ; les contenus EN (hero, steps, etc.) restent dans _data/en.json
      # mais ne sont pas remontés dans le CMS pour l'instant.
      - name: en
        label: "Pages EN — SEO / Métadonnées"
        file: "src/_data/en.json"
        fields:
          - name: meta
            label: "Home EN — SEO"
            widget: object
            fields:
              - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le SEO global FR." }
              - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max. Laisser vide pour utiliser le SEO global FR." }
              - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
              - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé." }
              - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: contact
            label: "Contact EN"
            widget: object
            fields:
              - name: meta
                label: "SEO / Métadonnées"
                widget: object
                fields:
                  - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le SEO de la home EN." }
                  - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max. Laisser vide pour utiliser le SEO de la home EN." }
                  - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
                  - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé." }
                  - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: demo
            label: "Démo EN"
            widget: object
            fields:
              - name: meta
                label: "SEO / Métadonnées"
                widget: object
                fields:
                  - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le SEO de la home EN." }
                  - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max. Laisser vide pour utiliser le SEO de la home EN." }
                  - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
                  - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630 recommandé." }
                  - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: legal
            label: "Pages légales EN — SEO"
            widget: object
            fields:
              - name: mentionsLegales
                label: "Legal notice — SEO"
                widget: object
                fields:
                  - name: meta
                    label: "SEO / Métadonnées"
                    widget: object
                    fields:
                      - { name: title, label: "SEO Title", widget: string, required: false, hint: "Laisser vide pour utiliser la valeur FR." }
                      - { name: description, label: "SEO Description", widget: text, required: false, hint: "Laisser vide pour utiliser la valeur FR." }
                      - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false }
                      - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false }
                      - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
              - name: engagements
                label: "Our commitments — SEO"
                widget: object
                fields:
                  - name: meta
                    label: "SEO / Métadonnées"
                    widget: object
                    fields:
                      - { name: title, label: "SEO Title", widget: string, required: false }
                      - { name: description, label: "SEO Description", widget: text, required: false }
                      - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false }
                      - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false }
                      - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
              - name: protectionDonnees
                label: "Data protection policy — SEO"
                widget: object
                fields:
                  - name: meta
                    label: "SEO / Métadonnées"
                    widget: object
                    fields:
                      - { name: title, label: "SEO Title", widget: string, required: false }
                      - { name: description, label: "SEO Description", widget: text, required: false }
                      - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false }
                      - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false }
                      - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
              - name: conditionsUtilisation
                label: "Terms of use — SEO"
                widget: object
                fields:
                  - name: meta
                    label: "SEO / Métadonnées"
                    widget: object
                    fields:
                      - { name: title, label: "SEO Title", widget: string, required: false }
                      - { name: description, label: "SEO Description", widget: text, required: false }
                      - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false }
                      - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false }
                      - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }

      # ---------- Pages légales FR ----------
      # Une seule entrée éditable qui regroupe les SEO meta des 4 pages
      # légales FR (mentions, engagements, protection des données, CGU).
      # Image et alt OG sont optionnels : si vides, on retombe sur
      # meta.legalOgImage / meta.legalOgImageAlt (réglages globaux).
      - name: legal
        label: "Pages légales (FR) — SEO / Métadonnées"
        file: "src/_data/legal.json"
        fields:
          - name: mentionsLegales
            label: "Mentions légales"
            widget: object
            fields:
              - name: meta
                label: "SEO / Métadonnées"
                widget: object
                fields:
                  - { name: title, label: "SEO Title", widget: string, required: false, hint: "~60 caractères max. Laisser vide pour utiliser le SEO global." }
                  - { name: description, label: "SEO Description", widget: text, required: false, hint: "~155 caractères max." }
                  - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
                  - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false, hint: "1200×630. Laisser vide pour utiliser l'image légale globale." }
                  - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: engagements
            label: "Nos engagements"
            widget: object
            fields:
              - name: meta
                label: "SEO / Métadonnées"
                widget: object
                fields:
                  - { name: title, label: "SEO Title", widget: string, required: false }
                  - { name: description, label: "SEO Description", widget: text, required: false }
                  - { name: robots, label: "Directive robots (optionnel)", widget: string, required: false, hint: "Laisser vide pour utiliser la directive globale. Ex. \"noindex, nofollow\" pour exclure cette page." }
                  - { name: ogImage, label: "Image de partage (réseaux sociaux)", widget: image, required: false }
                  - { name: ogImageAlt, label: "Image de partage — texte alternatif", widget: string, required: false }
          - name: protectionDonnees
            label: "Politique de protection des données"
            widget: object
            fields:
              - name: meta
                label: "SEO / Métadonnées"
                widget: object
                fields:
                  - { name: title, label: "SEO Title", widget: string, required: false }
